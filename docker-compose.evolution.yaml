services:
  openclaw-vibestack:
    image: ${OPENCLAW_IMAGE:-vibestack-openclaw:latest}
    build:
      context: .
      args:
        OPENCLAW_REF: ${OPENCLAW_REF:-main}
        # Backends de modelos locais — o ./install.sh grava estes no .env.
        # Baixa-se APENAS o que estiver 'true'. O instalado sobe no boot.
        INSTALL_OLLAMA: ${INSTALL_OLLAMA:-true}
        INSTALL_LMSTUDIO: ${INSTALL_LMSTUDIO:-false}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      #- HOME=/root
      - NODE_ENV=production
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      - OLLAMA_MODELS=/var/lib/ollama
      # Meta Ads CLI oficial le ACCESS_TOKEN/AD_ACCOUNT_ID; mantemos META_ACCESS_TOKEN
      # como alias historico para o .env nao mudar.
      - ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      # AtlasCloud — MCP oficial (hub de modelos). Auth so' por API key via env.
      - ATLASCLOUD_API_KEY=${ATLASCLOUD_API_KEY:-}
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Hermes — api_server OpenAI-compatible (alternativa ao OpenClaw).
      # API_SERVER_KEY e' obrigatorio pro gateway subir o servidor na 8642.
      # As tools (meta-ads/media-editor) reusam as vars Meta/B2 ja definidas acima.
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY:-}
      - HERMES_API_PORT=${HERMES_API_PORT:-8642}
      # O api_server (e demais canais) passa pela autorizacao de usuario do
      # gateway. Sem allowlist o default e' NEGAR (erro "not authorized"). Como
      # quem fala pelo WhatsApp ja' e' filtrado pelo bridge (WA_BRIDGE_ALLOWED_NUMBERS),
      # liberamos o gateway. Controle real do canal = WA_BRIDGE_ALLOWED_NUMBERS.
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-true}
      # Dashboard web do Hermes (pagina de gestao/chat) — porta separada da API.
      - HERMES_WEB_PORT=${HERMES_WEB_PORT:-9119}
      # WhatsApp via Evolution Go — o middleware MCP alcanca a API pelo DNS de
      # servico do compose (http://evolution-go:8080). Auth: GLOBAL (admin/create)
      # + token da instancia (send/qr/status).
      - EVOLUTION_BASE_URL=http://evolution-go:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVOLUTION_INSTANCE_TOKEN=${EVOLUTION_INSTANCE_TOKEN:-}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-vibestack}
      # Proxy opcional da instancia WhatsApp (Static Residential do Webshare etc.).
      # Preenchido = o bridge cria a instancia ja' atras do proxy. Vazio = sem proxy.
      - EVOLUTION_PROXY_PROTOCOL=${EVOLUTION_PROXY_PROTOCOL:-http}
      - EVOLUTION_PROXY_HOST=${EVOLUTION_PROXY_HOST:-}
      - EVOLUTION_PROXY_PORT=${EVOLUTION_PROXY_PORT:-}
      - EVOLUTION_PROXY_USERNAME=${EVOLUTION_PROXY_USERNAME:-}
      - EVOLUTION_PROXY_PASSWORD=${EVOLUTION_PROXY_PASSWORD:-}
      # Na criacao da instancia: ignora grupos e status (canal 1:1). Mude no .env
      # ou no Manager do Evolution se quiser que o agente veja grupos.
      - EVOLUTION_IGNORE_GROUPS=${EVOLUTION_IGNORE_GROUPS:-true}
      - EVOLUTION_IGNORE_STATUS=${EVOLUTION_IGNORE_STATUS:-true}
      # Auto-aprovacao de comandos (canal headless trava sem isso -> timeout). off|smart|manual.
      - HERMES_APPROVALS_MODE=${HERMES_APPROVALS_MODE:-off}
      # Bridge inbound do WhatsApp (webhook do Evolution -> agente -> resposta).
      # WA_BRIDGE_AGENT: quem responde o canal — 'hermes' (api_server) ou 'openclaw'
      # (CLI `openclaw agent`). WA_BRIDGE_ALLOWED_NUMBERS: CSV de numeros que podem
      # falar com o agente (vazio = qualquer um). Recomendado preencher.
      - WA_BRIDGE_AGENT=${WA_BRIDGE_AGENT:-hermes}
      - WA_BRIDGE_OPENCLAW_AGENT=${WA_BRIDGE_OPENCLAW_AGENT:-}
      - WA_BRIDGE_PORT=${WA_BRIDGE_PORT:-8765}
      - WA_BRIDGE_ALLOWED_NUMBERS=${WA_BRIDGE_ALLOWED_NUMBERS:-}
      # Tarefas longas (gerar criativo etc.): timeout do agente e aviso de "processando".
      - WA_BRIDGE_UPSTREAM_TIMEOUT=${WA_BRIDGE_UPSTREAM_TIMEOUT:-0}
      - WA_BRIDGE_ACK_AFTER=${WA_BRIDGE_ACK_AFTER:-20}
    volumes:
      # UM mount só, abrangendo tudo do OpenClaw
      - ${OPENCLAW_DATA_DIR}:/root/.openclaw
      # Ollama em mount separado (faz sentido — outro app)
      - ${OLLAMA_DATA_DIR}:/var/lib/ollama
      # LM Studio — persiste SO' os modelos (o engine/CLI ficam na imagem, igual ao
      # Ollama que persiste so' /var/lib/ollama). So' tem efeito se INSTALL_LMSTUDIO=true.
      - ${LMSTUDIO_DATA_DIR:-/root/.lmstudio}:/root/.lmstudio/models
      # Hermes — HERMES_HOME (config.yaml, .env, sessions, skills, memories).
      # Persistente pra que a config do provider editada pelo usuario sobreviva a rebuilds.
      # Default /root/.hermes funciona na VPS (HOME=/root); install.sh ajusta no Mac/Windows.
      - ${HERMES_DATA_DIR:-/root/.hermes}:/root/.hermes
      # Higgsfield CLI — token do `higgsfield auth login` (~/.higgsfield).
      # Persistente pra que a sessao sobreviva a restart/rebuild (aluno loga 1x).
      - ${HIGGSFIELD_DATA_DIR:-/root/.higgsfield}:/root/.higgsfield
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT}:18789"
      # Loopback do host pra alcancar o ollama interno (opcional, SSH tunnel):
      #   ssh -N -L 11434:127.0.0.1:11434 root@VPS
      - "127.0.0.1:11434:11434"
      # LM Studio — API OpenAI-compat (so' util se INSTALL_LMSTUDIO=true). SSH tunnel:
      #   ssh -N -L 1234:127.0.0.1:1234 root@VPS  -> http://localhost:1234/v1
      - "127.0.0.1:1234:1234"
      # Hermes — API OpenAI-compatible (porta separada, coexiste com o OpenClaw):
      #   ssh -N -L 8642:127.0.0.1:8642 root@VPS  -> http://localhost:8642/v1
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
      # Hermes — dashboard web (pagina de gestao/chat):
      #   ssh -N -L 9119:127.0.0.1:9119 root@VPS  -> http://localhost:9119
      - "127.0.0.1:${HERMES_WEB_PORT:-9119}:9119"
    command:
      - "openclaw"
      - "gateway"
      - "--bind"
      - "${OPENCLAW_GATEWAY_BIND}"
      - "--port"
      - "${OPENCLAW_GATEWAY_PORT}"
      - "--allow-unconfigured"

  # ============================================================
  # WhatsApp backend — Evolution Go (whatsmeow) + Postgres.
  # Servicos irmaos na mesma rede default do compose; o container
  # openclaw-vibestack alcanca a API por http://evolution-go:8080.
  # A API so' e' publicada em loopback no host (Manager/QR via SSH tunnel).
  # ============================================================
  postgres:
    # pgvector/pgvector = Postgres + extensao 'vector' pre-instalada (superset do
    # postgres oficial). Os exemplos oficiais do Evolution Go usam postgres:15-alpine
    # SEM pgvector; deixamos pgvector-ready por precaucao (risco zero). Pra voltar
    # ao plano puro, troque por 'postgres:16' e remova os CREATE EXTENSION do init.
    image: ${EVOLUTION_PG_IMAGE:-pgvector/pgvector:pg16}
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # init SQL cria evogo_auth/evogo_users e habilita a extensao 'vector' em cada um.
      - POSTGRES_DB=postgres
    volumes:
      - ${POSTGRES_DATA_DIR:-/root/.evogo-pg}:/var/lib/postgresql/data
      # Cria os dois bancos + extensao vector no primeiro init (volume vazio).
      - ./postgres/init-evolution-dbs.sql:/docker-entrypoint-initdb.d/init-evolution-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-go:
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-go:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - GLOBAL_API_KEY=${EVOLUTION_API_KEY}
      - POSTGRES_AUTH_DB=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evogo_auth?sslmode=disable
      - POSTGRES_USERS_DB=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evogo_users?sslmode=disable
      # Salva as mensagens no Postgres (historico). Mude p/ false no .env se nao quiser.
      - DATABASE_SAVE_MESSAGES=${EVOLUTION_SAVE_MESSAGES:-true}
      # Reconecta as instancias automaticamente no startup (a sessao do WhatsApp
      # fica no Postgres/evogo_auth). Sem isso, apos restart/rebuild a instancia
      # fica desconectada ate alguem chamar /instance/connect. Default do Evolution
      # e' false -> por isso "as conexoes se perdem". true = volta sozinho, sem QR.
      - CONNECT_ON_STARTUP=true
      # Webhook global: todo evento (inclusive mensagem recebida) vai pro bridge
      # inbound que roda no container openclaw-vibestack (DNS do compose).
      - WEBHOOK_URL=http://openclaw-vibestack:${WA_BRIDGE_PORT:-8765}/webhook
      # WEBHOOK_FILES: master switch que anexa a mídia recebida no webhook. SEMPRE on
      # pra o bridge receber imagem/áudio out-of-the-box:
      #   - MINIO_ENABLED=false -> mídia vai como base64 inline (data.Message.base64).
      #   - MINIO_ENABLED=true  -> mídia vai pro bucket e vem como data.Message.mediaUrl
      #     (presigned, ~7 dias) — payload do webhook mais enxuto + arquivo no seu S3.
      - WEBHOOK_FILES=true
      # Storage S3/MinIO p/ mídia recebida. Aponta p/ Backblaze B2 (S3-compatible) ou
      # MinIO próprio. Desligado por padrão (base64 inline cobre tudo). Ligue p/ offload.
      - MINIO_ENABLED=${EVOLUTION_MINIO_ENABLED:-false}
      - MINIO_ENDPOINT=${EVOLUTION_MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${EVOLUTION_MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${EVOLUTION_MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${EVOLUTION_MINIO_BUCKET:-}
      - MINIO_USE_SSL=${EVOLUTION_MINIO_USE_SSL:-true}
      - MINIO_REGION=${EVOLUTION_MINIO_REGION:-}
    volumes:
      - ${EVOLUTION_DATA_DIR:-/root/.evolution-go}:/app/data
    ports:
      # So' loopback no host — Manager/QR via SSH tunnel:
      #   ssh -N -L 8080:127.0.0.1:8080 root@VPS  -> http://localhost:8080/manager/login
      - "127.0.0.1:${EVOLUTION_PORT:-8080}:8080"
