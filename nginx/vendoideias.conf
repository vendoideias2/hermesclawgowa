# Configuração do Nginx para os domínios da VPS Vendo Ideias
# Salve este arquivo em /etc/nginx/sites-available/vendoideias.conf na sua VPS e crie o link simbólico para sites-enabled.
# Lembre-se de gerar os certificados SSL com o Certbot (sudo certbot --nginx).

# 1. OpenClaw (https://open.vendoideias.com) -> Porta 18789
server {
    listen 80;
    server_name open.vendoideias.com;

    location / {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

